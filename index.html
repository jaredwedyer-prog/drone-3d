<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interactive 3D Drone Model</title>

  <script type="module"
    src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
  </script>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #f5f5f5;
    }

    model-viewer {
      width: 100vw;
      height: 100vh;
      background: #f5f5f5;

      /* Hide the loading bar */
      --progress-bar-color: transparent;
      --progress-mask: none;
    }

    /* Completely hide the loading bar UI */
    model-viewer::part(progress-bar) {
      display: none;
    }
  </style>
</head>

<body>
  <model-viewer
    src="model.glb"
    alt="Interactive 3D drone photogrammetry model"
    camera-controls
    auto-rotate
    shadow-intensity="1"
    exposure="1"
    environment-image="neutral"
    camera-orbit="45deg 75deg 47%"
    field-of-view="25deg"
    min-camera-orbit="auto 45deg 20%"
    max-camera-orbit="auto 90deg 200%"
    interaction-prompt="none">
  </model-viewer>
</body>
</html>
